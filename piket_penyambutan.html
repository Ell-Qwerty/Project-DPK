<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piket Penyambutan | SMKN 3 Jember</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fdfdfd;
            margin: 0;
            padding: 20px;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            flex: 1;
        }

        .back-link {
            float: left;
            text-decoration: none;
            color: #27ae60;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        /* Pilihan Gerbang */
        .gerbang-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .btn-gerbang {
            padding: 15px 25px;
            border: 2px solid #27ae60;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-gerbang.active {
            background: #27ae60;
            color: white;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        /* Hari Tabs */
        .tabs-hari {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 18px;
            border: none;
            background: #eee;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #27ae60;
            color: white;
        }

        /* GRID GURU MENYAMPING (HORIZONTAL) */
        .grid-guru {
            display: flex;
            /* Kunci menyamping */
            overflow-x: auto;
            /* Biar bisa di-scroll */
            gap: 20px;
            padding: 20px 10px 40px 10px;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            /* Efek lock di tengah */
            -webkit-overflow-scrolling: touch;
        }

        /* Styling Scrollbar */
        .grid-guru::-webkit-scrollbar {
            height: 8px;
        }

        .grid-guru::-webkit-scrollbar-thumb {
            background: #27ae60;
            border-radius: 10px;
        }

        .card-guru {
            background: white;
            min-width: 260px;
            /* Lebar kartu agar tidak gepeng */
            padding: 30px 20px;
            border-radius: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            scroll-snap-align: center;
            /* Kartu berhenti di tengah */
            border: 1px solid #f0f0f0;
        }

        .card-guru:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
            border-color: #27ae60;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: #f0fdf4;
            border-radius: 50%;
            margin: 0 auto 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #27ae60;
        }

        .icon-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Geser posisi foto 20% dari atas, biar mukanya kelihatan */
            object-position: center 20%;
        }


        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 380px;
            margin: 100px auto;
            padding: 35px;
            border-radius: 25px;
            text-align: center;
            position: relative;
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .close {
            position: absolute;
            right: 20px;
            top: 10px;
            cursor: pointer;
            font-size: 28px;
            color: #999;
        }

        footer {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: auto;
        }

        footer b {
            color: #f1c40f;
        }
    </style>
</head>

<body>

        <div class="tabs-hari">

        const pathFolder = "FOTO/";

        function setGerbang(lokasi) {
            gerbangAktif = lokasi;
            document.querySelectorAll('.btn-gerbang').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn' + lokasi).classList.add('active');
            updateTampilan();
        }

        function setHari(hari, el) {
            hariAktif = hari;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            updateTampilan();
        }

        function updateTampilan() {
            const list = document.getElementById('listGuru');
            list.innerHTML = '';
            list.scrollLeft = 0; // Balikin scroll ke awal

            const guruHariIni = (databaseGuru[gerbangAktif] && databaseGuru[gerbangAktif][hariAktif]) || [];

            if (guruHariIni.length > 0) {
                guruHariIni.forEach(guru => {
                    list.innerHTML += `
                    <div class="card-guru" onclick="bukaModal('${guru.nama}', '${guru.icon}')">
                        <div class="icon-circle">
                            <img src="${pathFolder}${guru.icon}" onerror="this.src='https://placeholder.com'" alt="Foto ${guru.nama}">
                        </div>
                        <h3>${guru.nama}</h3>
                    </div>
                `;
                });
            } else {
                list.innerHTML = '<p style="padding: 40px; width: 100%; text-align: center;">Belum ada jadwal piket.</p>';
            }
        }

        function bukaModal(nama, icon) {
            document.getElementById('m-nama').innerText = nama;
            document.getElementById('m-lokasi').innerText = "📍 " + gerbangAktif;
            document.getElementById('m-icon-container').innerHTML = `
                <img src="${pathFolder}${icon}" style="width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 5px solid #27ae60;" onerror="this.src='https://placeholder.com'">
            `;
            document.getElementById('modalGuru').style.display = 'block';
        }

        function tutupModal() { document.getElementById('modalGuru').style.display = 'none'; }

        window.onclick = (e) => { if (e.target.classList.contains('modal')) tutupModal(); }

        window.onload = updateTampilan;
    </script>

</body>
